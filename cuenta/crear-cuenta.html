<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta — Portafolios Docentes 2026</title>
    <link rel="icon" href="/imagenes/logo-profe-francisco-nuevo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tw.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 font-body antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="/imagenes/logo-profe-francisco-nuevo.svg" alt="Logo" class="h-10 w-auto">
                <span class="text-lg font-bold font-heading text-gray-900 hidden sm:inline">Portafolios Docentes</span>
            </a>
            <a href="/cuenta/login.html" class="text-sm font-medium text-primary-600 hover:text-primary-700">¿Ya tienes cuenta? Ingresar</a>
        </nav>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-lg">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-heading font-bold text-gray-900 mb-2">Crear tu Cuenta</h1>
                <p class="text-gray-600">Completa tus datos para comenzar el proceso de tu Portafolio Docente 2026.</p>
                <div id="plan-badge" class="mt-3 hidden">
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-primary-100 text-primary-700"></span>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <form id="register-form" class="space-y-5">
                    <!-- Nombre Completo -->
                    <div>
                        <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Ej: María González Pérez">
                    </div>

                    <!-- RUT -->
                    <div>
                        <label for="rut" class="block text-sm font-medium text-gray-700 mb-1">RUT</label>
                        <input type="text" id="rut" name="rut" required maxlength="12"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Ej: 12.345.678-9">
                        <p id="rut-error" class="text-red-500 text-xs mt-1 hidden">RUT inválido</p>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="tu@correo.com">
                    </div>

                    <!-- Teléfono -->
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="+56 9 1234 5678">
                    </div>

                    <!-- Asignatura -->
                    <div>
                        <label for="asignatura" class="block text-sm font-medium text-gray-700 mb-1">Asignatura</label>
                        <select id="asignatura" name="asignatura" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all bg-white">
                            <option value="">Selecciona tu asignatura</option>
                            <option value="Lenguaje y Comunicación">Lenguaje y Comunicación</option>
                            <option value="Matemática">Matemática</option>
                            <option value="Historia y Ciencias Sociales">Historia y Ciencias Sociales</option>
                            <option value="Ciencias Naturales">Ciencias Naturales</option>
                            <option value="Biología">Biología</option>
                            <option value="Física">Física</option>
                            <option value="Química">Química</option>
                            <option value="Inglés">Inglés</option>
                            <option value="Educación Física">Educación Física</option>
                            <option value="Artes Visuales">Artes Visuales</option>
                            <option value="Música">Música</option>
                            <option value="Tecnología">Tecnología</option>
                            <option value="Filosofía">Filosofía</option>
                            <option value="Religión">Religión</option>
                            <option value="Educación Parvularia">Educación Parvularia</option>
                            <option value="Educación Diferencial">Educación Diferencial</option>
                            <option value="Educación Básica Generalista">Educación Básica Generalista</option>
                            <option value="Otra">Otra</option>
                        </select>
                    </div>

                    <!-- Nivel -->
                    <div>
                        <label for="nivel" class="block text-sm font-medium text-gray-700 mb-1">Nivel Educativo</label>
                        <select id="nivel" name="nivel" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all bg-white">
                            <option value="">Selecciona tu nivel</option>
                            <option value="Educación Parvularia">Educación Parvularia</option>
                            <option value="Educación Básica (1° a 4°)">Educación Básica (1° a 4°)</option>
                            <option value="Educación Básica (5° a 8°)">Educación Básica (5° a 8°)</option>
                            <option value="Educación Media">Educación Media</option>
                            <option value="Educación Especial / Diferencial">Educación Especial / Diferencial</option>
                        </select>
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input type="password" id="password" name="password" required minlength="6"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Mínimo 6 caracteres">
                    </div>

                    <!-- Plan oculto -->
                    <input type="hidden" id="plan" name="plan" value="completo">

                    <!-- Error message -->
                    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn"
                            class="w-full py-3 px-4 bg-primary-600 text-white font-semibold rounded-xl hover:bg-primary-700 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        Crear Cuenta y Continuar al Pago
                    </button>
                </form>
            </div>

            <p class="text-center text-xs text-gray-500 mt-4">
                Al crear tu cuenta aceptas que tus datos serán tratados de forma confidencial.
            </p>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="/js/firebase-config.js"></script>

    <script>
    (function() {
        // Init Firebase
        firebase.initializeApp(FIREBASE_CONFIG);
        var auth = firebase.auth();
        var db = firebase.database();

        // Get plan from URL
        var params = new URLSearchParams(window.location.search);
        var plan = params.get('plan') || 'completo';
        document.getElementById('plan').value = plan;

        // Plan labels
        var planLabels = {
            completo: 'Portafolio Completo — $199.990',
            modulo1: 'Módulo 1: Planificación — $79.990',
            modulo2: 'Módulo 2: Clase Grabada — $99.990',
            modulo3: 'Módulo 3: Reflexión — $79.990'
        };

        var badge = document.getElementById('plan-badge');
        if (planLabels[plan]) {
            badge.classList.remove('hidden');
            badge.querySelector('span').textContent = planLabels[plan];
        }

        // RUT formatting and validation
        var rutInput = document.getElementById('rut');
        rutInput.addEventListener('input', function() {
            var value = this.value.replace(/[^0-9kK]/g, '');
            if (value.length > 1) {
                var body = value.slice(0, -1);
                var dv = value.slice(-1).toUpperCase();
                // Format with dots
                body = body.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                this.value = body + '-' + dv;
            }
            document.getElementById('rut-error').classList.add('hidden');
        });

        function validateRut(rut) {
            var clean = rut.replace(/[.\-]/g, '');
            if (clean.length < 7 || clean.length > 9) return false;
            var body = clean.slice(0, -1);
            var dv = clean.slice(-1).toUpperCase();
            var sum = 0;
            var mul = 2;
            for (var i = body.length - 1; i >= 0; i--) {
                sum += parseInt(body[i]) * mul;
                mul = mul === 7 ? 2 : mul + 1;
            }
            var expected = 11 - (sum % 11);
            var dvExpected = expected === 11 ? '0' : expected === 10 ? 'K' : String(expected);
            return dv === dvExpected;
        }

        // Form submission
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            var nombre = document.getElementById('nombre').value.trim();
            var rut = document.getElementById('rut').value.trim();
            var email = document.getElementById('email').value.trim();
            var telefono = document.getElementById('telefono').value.trim();
            var asignatura = document.getElementById('asignatura').value;
            var nivel = document.getElementById('nivel').value;
            var password = document.getElementById('password').value;
            var selectedPlan = document.getElementById('plan').value;
            var errorMsg = document.getElementById('error-msg');
            var submitBtn = document.getElementById('submit-btn');

            // Validate RUT
            if (!validateRut(rut)) {
                document.getElementById('rut-error').classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creando cuenta...';

            // Create Firebase Auth user
            auth.createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    var uid = userCredential.user.uid;

                    // Save user data
                    var userData = {
                        nombre: nombre,
                        rut: rut,
                        email: email,
                        telefono: telefono,
                        asignatura: asignatura,
                        nivel: nivel,
                        plan: selectedPlan,
                        role: 'cliente',
                        createdAt: new Date().toISOString()
                    };

                    // Initialize portfolio structure
                    var planModules = {
                        completo: { modulo1: true, modulo2: true, modulo3: true },
                        modulo1: { modulo1: true, modulo2: false, modulo3: false },
                        modulo2: { modulo1: false, modulo2: true, modulo3: false },
                        modulo3: { modulo1: false, modulo2: false, modulo3: true }
                    };
                    var modules = planModules[selectedPlan] || planModules.completo;

                    var portafolioData = {
                        plan: selectedPlan,
                        paymentStatus: 'pendiente',
                        createdAt: new Date().toISOString(),
                        modulo1: {
                            contratado: modules.modulo1,
                            estado: modules.modulo1 ? 'pendiente' : 'no-contratado',
                            planificacion: false,
                            material: false,
                            notas: ''
                        },
                        modulo2: {
                            contratado: modules.modulo2,
                            estado: modules.modulo2 ? 'pendiente' : 'no-contratado',
                            libreto: false,
                            presentacion: false,
                            guia: false,
                            notas: ''
                        },
                        modulo3: {
                            contratado: modules.modulo3,
                            estado: modules.modulo3 ? 'pendiente' : 'no-contratado',
                            obligatorio: false,
                            voluntario: false,
                            notas: ''
                        }
                    };

                    // Save both in parallel
                    return Promise.all([
                        db.ref('users/' + uid).set(userData),
                        db.ref('portafolios/' + uid).set(portafolioData)
                    ]).then(function() {
                        // Redirect to MercadoPago payment
                        return fetch('/api/mercadopago/create_preference', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: nombre,
                                email: email,
                                plan: selectedPlan,
                                uid: uid
                            })
                        });
                    });
                })
                .then(function(response) {
                    if (!response.ok) throw new Error('Error al crear preferencia de pago');
                    return response.json();
                })
                .then(function(data) {
                    if (data.preference && data.preference.init_point) {
                        window.location.href = data.preference.init_point;
                    } else {
                        // If MP fails, redirect to dashboard anyway
                        window.location.href = '/dashboard/index.html';
                    }
                })
                .catch(function(error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Crear Cuenta y Continuar al Pago';
                    errorMsg.classList.remove('hidden');

                    if (error.code === 'auth/email-already-in-use') {
                        errorMsg.textContent = 'Este correo ya está registrado. ¿Quieres ingresar en su lugar?';
                    } else if (error.code === 'auth/weak-password') {
                        errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                    } else {
                        errorMsg.textContent = error.message || 'Error al crear la cuenta. Intenta nuevamente.';
                    }
                });
        });
    })();
    </script>
</body>
</html>
