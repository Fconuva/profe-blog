<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Inscripción — Portafolios Docentes 2026</title>
    <link rel="icon" href="/imagenes/logo-profe-francisco-nuevo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tw.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 font-body antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="/imagenes/logo-profe-francisco-nuevo.svg" alt="Logo" class="h-10 w-auto">
                <span class="text-lg font-bold font-heading text-gray-900 hidden sm:inline">Portafolios Docentes</span>
            </a>
            <a href="/cuenta/login.html" class="text-sm font-medium text-primary-600 hover:text-primary-700">¿Ya tienes cuenta? Ingresar</a>
        </nav>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-lg">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-heading font-bold text-gray-900 mb-2">Pre-Inscripción Gratuita</h1>
                <p class="text-gray-600">Regístrate para asegurar tu cupo en el servicio de Portafolio Docente 2026. Te avisaremos cuando se abra el proceso oficial.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <form id="register-form" class="space-y-5">
                    <!-- Nombre Completo -->
                    <div>
                        <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Ej: María González Pérez">
                    </div>

                    <!-- RUT -->
                    <div>
                        <label for="rut" class="block text-sm font-medium text-gray-700 mb-1">RUT</label>
                        <input type="text" id="rut" name="rut" required maxlength="12"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Ej: 12.345.678-9">
                        <p id="rut-error" class="text-red-500 text-xs mt-1 hidden">RUT inválido</p>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="tu@correo.com">
                    </div>

                    <!-- Teléfono -->
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="+56 9 1234 5678">
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input type="password" id="password" name="password" required minlength="6"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Mínimo 6 caracteres">
                    </div>

                    <!-- Error message -->
                    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn"
                            class="w-full py-3 px-4 bg-primary-600 text-white font-semibold rounded-xl hover:bg-primary-700 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        Pre-Inscribirme Gratis
                    </button>
                </form>
            </div>

            <p class="text-center text-xs text-gray-500 mt-4">
                Al crear tu cuenta aceptas que tus datos serán tratados de forma confidencial.
            </p>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="/js/firebase-config.js"></script>

    <script>
    (function() {
        firebase.initializeApp(FIREBASE_CONFIG);
        var auth = firebase.auth();
        var db = firebase.database();

        // If already logged in, go to dashboard
        auth.onAuthStateChanged(function(user) {
            if (user) window.location.href = '/dashboard/index.html';
        });

        // RUT formatting
        var rutInput = document.getElementById('rut');
        rutInput.addEventListener('input', function() {
            var value = this.value.replace(/[^0-9kK]/g, '');
            if (value.length > 1) {
                var body = value.slice(0, -1);
                var dv = value.slice(-1).toUpperCase();
                body = body.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                this.value = body + '-' + dv;
            }
            document.getElementById('rut-error').classList.add('hidden');
        });

        function validateRut(rut) {
            var clean = rut.replace(/[.\-]/g, '');
            if (clean.length < 7 || clean.length > 9) return false;
            var body = clean.slice(0, -1);
            var dv = clean.slice(-1).toUpperCase();
            var sum = 0;
            var mul = 2;
            for (var i = body.length - 1; i >= 0; i--) {
                sum += parseInt(body[i]) * mul;
                mul = mul === 7 ? 2 : mul + 1;
            }
            var expected = 11 - (sum % 11);
            var dvExpected = expected === 11 ? '0' : expected === 10 ? 'K' : String(expected);
            return dv === dvExpected;
        }

        // Form submission
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();

            var nombre = document.getElementById('nombre').value.trim();
            var rut = document.getElementById('rut').value.trim();
            var email = document.getElementById('email').value.trim();
            var telefono = document.getElementById('telefono').value.trim();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('error-msg');
            var submitBtn = document.getElementById('submit-btn');

            if (!validateRut(rut)) {
                document.getElementById('rut-error').classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registrando...';

            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
              .then(function() {
                return auth.createUserWithEmailAndPassword(email, password);
              })
                .then(function(userCredential) {
                    var uid = userCredential.user.uid;
                    return db.ref('users/' + uid).set({
                        nombre: nombre,
                        rut: rut,
                        email: email,
                        telefono: telefono,
                        role: 'cliente',
                        status: 'pre-inscrito',
                        createdAt: new Date().toISOString()
                    });
                })
                .then(function() {
                    window.location.href = '/dashboard/index.html';
                })
                .catch(function(error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Pre-Inscribirme Gratis';
                    errorMsg.classList.remove('hidden');
                    if (error.code === 'auth/email-already-in-use') {
                        errorMsg.textContent = 'Este correo ya está registrado. ¿Quieres ingresar en su lugar?';
                    } else if (error.code === 'auth/weak-password') {
                        errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                    } else {
                        errorMsg.textContent = error.message || 'Error al crear la cuenta. Intenta nuevamente.';
                    }
                });
        });
    })();
    </script>
</body>
</html>
