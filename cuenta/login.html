<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — Portafolios Docentes 2026</title>
    <link rel="icon" href="/imagenes/logo-profe-francisco-nuevo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tw.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 font-body antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="/imagenes/logo-profe-francisco-nuevo.svg" alt="Logo" class="h-10 w-auto">
                <span class="text-lg font-bold font-heading text-gray-900 hidden sm:inline">Portafolios Docentes</span>
            </a>
            <a href="/cuenta/crear-cuenta.html" class="text-sm font-medium text-primary-600 hover:text-primary-700">¿No tienes cuenta? Crear una</a>
        </nav>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-heading font-bold text-gray-900 mb-2">Ingresar</h1>
                <p class="text-gray-600">Accede a tu panel para ver el avance de tu portafolio.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <form id="login-form" class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="tu@correo.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input type="password" id="password" name="password" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Tu contraseña">
                    </div>

                    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>

                    <button type="submit" id="submit-btn"
                            class="w-full py-3 px-4 bg-primary-600 text-white font-semibold rounded-xl hover:bg-primary-700 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        Ingresar
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-500">¿Olvidaste tu contraseña? <a href="https://wa.me/56988138929?text=Hola%2C%20necesito%20restablecer%20mi%20contrase%C3%B1a%20en%20Portafolio%20Docente%202026" target="_blank" class="text-primary-600 hover:text-primary-700 font-medium">Escríbenos por WhatsApp</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="/js/firebase-config.js"></script>

    <script>
    (function() {
        firebase.initializeApp(FIREBASE_CONFIG);
        var auth = firebase.auth();
        var db = firebase.database();

        // Check if already logged in
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // Check if admin
                db.ref('users/' + user.uid + '/role').once('value').then(function(snap) {
                    if (snap.val() === 'admin') {
                        window.location.href = '/admin/index.html';
                    } else {
                        window.location.href = '/dashboard/index.html';
                    }
                });
            }
        });

        // Login form
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('error-msg');
            var submitBtn = document.getElementById('submit-btn');

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Ingresando...';

            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
              .then(function() {
                return auth.signInWithEmailAndPassword(email, password);
              })
                .then(function(userCredential) {
                    var uid = userCredential.user.uid;
                    return db.ref('users/' + uid).once('value').then(function(snap) {
                        if (!snap.exists()) {
                            // Restore missing users entry (e.g. after DB cleanup)
                            return db.ref('users/' + uid).set({
                                email: email,
                                nombre: email.split('@')[0],
                                role: 'cliente',
                                status: 'pre-inscrito',
                                createdAt: new Date().toISOString()
                            }).then(function() {
                                return { role: 'cliente' };
                            });
                        }
                        return snap.val();
                    });
                })
                .then(function(userData) {
                    if (userData.role === 'admin') {
                        window.location.href = '/admin/index.html';
                    } else {
                        window.location.href = '/dashboard/index.html';
                    }
                })
                .catch(function(error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Ingresar';
                    errorMsg.classList.remove('hidden');
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        errorMsg.textContent = 'Correo o contraseña incorrectos.';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg.textContent = 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
                    } else {
                        errorMsg.textContent = 'Error al ingresar. Intenta nuevamente.';
                    }
                });
        });


    })();
    </script>
</body>
</html>
