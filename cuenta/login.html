<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — Portafolios Docentes 2026</title>
    <link rel="icon" href="/imagenes/logo-profe-francisco-nuevo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/css/tw.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-gray-50 font-body antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="/imagenes/logo-profe-francisco-nuevo.svg" alt="Logo" class="h-10 w-auto">
                <span class="text-lg font-bold font-heading text-gray-900 hidden sm:inline">Portafolios Docentes</span>
            </a>
            <a href="/cuenta/crear-cuenta.html" class="text-sm font-medium text-primary-600 hover:text-primary-700">¿No tienes cuenta? Crear una</a>
        </nav>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-heading font-bold text-gray-900 mb-2">Ingresar</h1>
                <p class="text-gray-600">Accede a tu panel para ver el avance de tu portafolio.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <form id="login-form" class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required autocomplete="email"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="tu@correo.com">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                        <input type="password" id="password" name="password" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all"
                               placeholder="Tu contraseña">
                    </div>

                    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"></div>

                    <button type="submit" id="submit-btn"
                            class="w-full py-3 px-4 bg-primary-600 text-white font-semibold rounded-xl hover:bg-primary-700 active:scale-[0.99] transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        Ingresar
                    </button>
                </form>

                <!-- Google Sign-In Button -->
                <div class="mt-6 pt-6 border-t border-gray-200">
                    <button type="button" id="google-signin-btn"
                            class="w-full py-3 px-4 bg-white text-gray-700 font-semibold rounded-xl hover:bg-gray-50 active:scale-[0.99] transition-all shadow-sm border border-gray-300 flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Continuar con Google
                    </button>
                </div>

                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-500">¿Olvidaste tu contraseña?</p>
                    <button type="button" id="reset-password-btn" class="mt-1 text-sm text-primary-600 hover:text-primary-700 font-semibold">Solicitar cambio de contraseña por WhatsApp</button>
                    <p id="reset-msg" class="hidden text-xs mt-2 font-medium"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="/js/firebase-config.js"></script>

    <script>
    (function() {
        firebase.initializeApp(FIREBASE_CONFIG);
        var auth = firebase.auth();
        var db = firebase.database();

        // Google Sign-In
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        function signInWithGoogle() {
            var provider = new firebase.auth.GoogleAuthProvider();
            var googleBtn = document.getElementById('google-signin-btn');
            googleBtn.disabled = true;
            googleBtn.textContent = 'Conectando con Google...';

            auth.signInWithPopup(provider)
                .then(function(userCredential) {
                    var user = userCredential.user;
                    var uid = user.uid;

                    // Check if user exists in RTDB
                    return db.ref('users/' + uid).once('value').then(function(snap) {
                        if (!snap.exists()) {
                            // New user from Google: create entry in RTDB
                            return db.ref('users/' + uid).set({
                                nombre: user.displayName || user.email.split('@')[0],
                                email: user.email,
                                photoURL: user.photoURL || '',
                                role: 'cliente',
                                status: 'pre-inscrito',
                                authProvider: 'google',
                                createdAt: new Date().toISOString()
                            }).then(function() {
                                // Create portafolio entry for new user
                                return db.ref('portafolios/' + uid).set({
                                    plan: 'pre-inscripcion',
                                    paymentStatus: 'pre-inscrito',
                                    createdAt: new Date().toISOString()
                                });
                            }).then(function() {
                                return { role: 'cliente' };
                            });
                        }
                        return snap.val();
                    });
                })
                .then(function(userData) {
                    // Redirect based on role
                    if (userData.role === 'admin') {
                        window.location.href = '/admin/';
                    } else {
                        window.location.href = '/dashboard/';
                    }
                })
                .catch(function(error) {
                    googleBtn.disabled = false;
                    googleBtn.textContent = 'Continuar con Google';
                    console.error('Google Sign-In error:', error.code, error.message);
                    var errorMsg = document.getElementById('error-msg');
                    if (errorMsg) {
                        errorMsg.classList.remove('hidden');
                        if (error.code === 'auth/popup-closed-by-user') {
                            errorMsg.textContent = 'La ventana de Google fue cerrada. Intenta de nuevo.';
                        } else if (error.code === 'auth/popup-blocked') {
                            errorMsg.textContent = 'El navegador bloqueó la ventana de Google. Activa pop-ups.';
                        } else if (error.code === 'auth/account-exists-with-different-credential') {
                            errorMsg.textContent = 'Esta cuenta Google ya está registrada con otro método. Intenta con tu correo y contraseña.';
                        } else {
                            errorMsg.textContent = 'Error al conectar con Google. Intenta nuevamente.';
                        }
                    }
                });
        }

        // Attach click handler
        var googleBtn = document.getElementById('google-signin-btn');
        if (googleBtn) {
            googleBtn.addEventListener('click', signInWithGoogle);
        }

        // Check if already logged in
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // Check if admin
                db.ref('users/' + user.uid + '/role').once('value').then(function(snap) {
                    if (snap.val() === 'admin') {
                        window.location.href = '/admin/';
                    } else {
                        window.location.href = '/dashboard/';
                    }
                });
            }
        });

        // Login form
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('error-msg');
            var submitBtn = document.getElementById('submit-btn');

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Ingresando...';

            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
              .then(function() {
                return auth.signInWithEmailAndPassword(email, password);
              })
                .then(function(userCredential) {
                    var uid = userCredential.user.uid;
                    return db.ref('users/' + uid).once('value').then(function(snap) {
                        if (!snap.exists()) {
                            // Restore missing users entry (e.g. after DB cleanup)
                            return db.ref('users/' + uid).set({
                                email: email,
                                nombre: email.split('@')[0],
                                role: 'cliente',
                                status: 'pre-inscrito',
                                createdAt: new Date().toISOString()
                            }).then(function() {
                                return { role: 'cliente' };
                            });
                        }
                        return snap.val();
                    });
                })
                .then(function(userData) {
                    if (userData.role === 'admin') {
                        window.location.href = '/admin/';
                    } else {
                        window.location.href = '/dashboard/';
                    }
                })
                .catch(function(error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Ingresar';
                    errorMsg.classList.remove('hidden');
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        errorMsg.textContent = 'Correo o contraseña incorrectos.';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg.textContent = 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
                    } else {
                        errorMsg.textContent = 'Error al ingresar. Intenta nuevamente.';
                    }
                });
        });

        document.getElementById('reset-password-btn').addEventListener('click', function() {
            var email = document.getElementById('email').value.trim();
            var resetMsg = document.getElementById('reset-msg');

            resetMsg.classList.remove('hidden', 'text-red-600', 'text-green-700');

            // El cambio de contraseña lo hace el profe manualmente: abrimos WhatsApp con el mensaje listo.
            var msg = 'Hola Profe Francisco 👋 Necesito cambiar mi contraseña de la plataforma del Portafolio Docente.';
            if (email) {
                msg += ' Mi correo de acceso es: ' + email;
            } else {
                msg += ' (mi correo de acceso es: ____ )';
            }
            window.open('https://wa.me/56988138929?text=' + encodeURIComponent(msg), '_blank', 'noopener');

            resetMsg.textContent = email
                ? 'Te abrimos WhatsApp con tu solicitud lista. Envíala y el profe te cambiará la contraseña.'
                : 'Te abrimos WhatsApp. Escribe tu correo de acceso en el mensaje y el profe te cambiará la contraseña.';
            resetMsg.classList.add('text-green-700');
        });


    })();
    </script>
</body>
</html>
