<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#3B82F6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0.1" />
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <circle cx="60" cy="60" r="55" fill="url(#logoGradient)" filter="url(#shadow)"/>

  <g transform="translate(60, 60)">
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" filter="url(#glow)"/>

    <ellipse cx="0" cy="0" rx="35" ry="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <circle cx="-35" cy="0" r="3" fill="#FFFFFF" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="0" r="3" fill="#FFFFFF" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>

    <ellipse cx="0" cy="0" rx="8" ry="35" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="-35" r="3" fill="#FFFFFF" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="35" r="3" fill="#FFFFFF" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>

    <ellipse cx="0" cy="0" rx="25" ry="25" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8" transform="rotate(45)"/>
    <circle cx="-25" cy="-25" r="2.5" fill="#FFFFFF" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="25" r="2.5" fill="#FFFFFF" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(20, 25)">
    <rect x="0" y="0" width="8" height="12" fill="#FFFFFF" rx="1" ry="1" opacity="0.9"/>
    <rect x="1" y="1" width="6" height="10" fill="#F8FAFC" rx="0.5" ry="0.5"/>
    <line x1="2" y1="4" x2="6" y2="4" stroke="#CBD5E1" stroke-width="0.5"/>
    <line x1="2" y1="6" x2="5" y2="6" stroke="#CBD5E1" stroke-width="0.5"/>
    <line x1="2" y1="8" x2="6" y2="8" stroke="#CBD5E1" stroke-width="0.5"/>
  </g>

  <g transform="translate(92, 83)">
    <rect x="0" y="0" width="8" height="12" fill="#FFFFFF" rx="1" ry="1" opacity="0.9"/>
    <rect x="1" y="1" width="6" height="10" fill="#F8FAFC" rx="0.5" ry="0.5"/>
    <line x1="2" y1="4" x2="6" y2="4" stroke="#CBD5E1" stroke-width="0.5"/>
    <line x1="2" y1="6" x2="5" y2="6" stroke="#CBD5E1" stroke-width="0.5"/>
    <line x1="2" y1="8" x2="6" y2="8" stroke="#CBD5E1" stroke-width="0.5"/>
  </g>

  <text x="60" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" filter="url(#glow)">
    FP
  </text>

  <ellipse cx="30" cy="30" rx="8" ry="5" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="90" cy="90" rx="6" ry="4" fill="#FFFFFF" opacity="0.2"/>
</svg>