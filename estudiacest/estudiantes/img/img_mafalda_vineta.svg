<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg" width="840" height="400">
  <!-- Panel background -->
  <rect x="2" y="2" width="416" height="196" rx="6" fill="#fffef5" stroke="#222" stroke-width="3"/>
  <!-- Mafalda character -->
  <g transform="translate(18,70) scale(1.1)">
    <!-- Body -->
    <rect x="6" y="38" width="32" height="38" rx="6" fill="#e63946"/>
    <!-- Arms raised (angry/passionate) -->
    <path d="M6,44 L-8,28 L-4,26 L8,42Z" fill="#f0c8a0"/>
    <path d="M38,44 L50,28 L46,26 L36,42Z" fill="#f0c8a0"/>
    <!-- Hands -->
    <circle cx="-6" cy="27" r="4" fill="#f0c8a0"/>
    <circle cx="48" cy="27" r="4" fill="#f0c8a0"/>
    <!-- Legs -->
    <rect x="10" y="74" width="8" height="20" rx="2" fill="#f0c8a0"/>
    <rect x="24" y="74" width="8" height="20" rx="2" fill="#f0c8a0"/>
    <!-- Shoes -->
    <ellipse cx="14" cy="95" rx="7" ry="4" fill="#222"/>
    <ellipse cx="28" cy="95" rx="7" ry="4" fill="#222"/>
    <!-- Head -->
    <circle cx="22" cy="20" r="20" fill="#f0c8a0"/>
    <!-- Big black hair (iconic Mafalda) -->
    <path d="M1,16 Q-4,-8 22,-10 Q48,-8 43,16 Q38,4 22,4 Q6,4 1,16Z" fill="#1a1a1a"/>
    <circle cx="-2" cy="10" r="6" fill="#1a1a1a"/>
    <circle cx="46" cy="10" r="6" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="5" fill="#1a1a1a"/>
    <circle cx="44" cy="0" r="5" fill="#1a1a1a"/>
    <circle cx="10" cy="-6" r="5" fill="#1a1a1a"/>
    <circle cx="34" cy="-6" r="5" fill="#1a1a1a"/>
    <circle cx="22" cy="-8" r="5" fill="#1a1a1a"/>
    <!-- Red bow -->
    <path d="M36,-2 L46,-7 L42,0 L48,5 L36,1Z" fill="#e63946"/>
    <!-- Eyes (big, expressive) -->
    <ellipse cx="14" cy="20" rx="4" ry="4.5" fill="white" stroke="#222" stroke-width="1"/>
    <circle cx="15" cy="20" r="2.5" fill="#222"/>
    <ellipse cx="30" cy="20" rx="4" ry="4.5" fill="white" stroke="#222" stroke-width="1"/>
    <circle cx="31" cy="20" r="2.5" fill="#222"/>
    <!-- Angry eyebrows -->
    <line x1="9" y1="14" x2="18" y2="13" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="13" x2="34" y2="14" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- Open mouth (shouting) -->
    <ellipse cx="22" cy="30" rx="6" ry="4" fill="#222"/>
    <ellipse cx="22" cy="29" rx="5" ry="2" fill="#c0392b"/>
  </g>
  <!-- Speech bubble -->
  <path d="M110,20 L390,20 Q400,20 400,30 L400,160 Q400,170 390,170 L130,170 L90,185 L105,170 L110,170 Q100,170 100,160 L100,30 Q100,20 110,20Z" fill="white" stroke="#222" stroke-width="2.5"/>
  <!-- Quote text -->
  <text x="250" y="65" text-anchor="middle" font-family="'Merriweather',serif" font-weight="700" font-size="14" fill="#1a1a1a">
    <tspan x="250" dy="0">«¡SOÑAMOS, MUCHACHOS!</tspan>
    <tspan x="250" dy="22">RESULTA QUE SI UNO NO SE</tspan>
    <tspan x="250" dy="22">APURA A CAMBIAR EL MUNDO,</tspan>
    <tspan x="250" dy="22">DESPUÉS ES EL MUNDO</tspan>
    <tspan x="250" dy="22">EL QUE LO CAMBIA A UNO!»</tspan>
  </text>
</svg>
