<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SIMCE S5 — El Cuento: Estructura y Elementos Narrativos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--panel:#1e293b;--border:#334155;--accent:#3b82f6;--accent2:#8b5cf6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--text:#e2e8f0;--dim:#94a3b8;--gold:#fbbf24}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.top-bar{background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:100}
.top-bar h1{font-size:.9rem;color:#fff}.top-bar .xp{background:var(--accent);color:#fff;padding:3px 12px;border-radius:20px;font-weight:700;font-size:.8rem}
.progress-wrap{background:#0d1117;padding:6px 20px;position:sticky;top:44px;z-index:99}
.top-bar{top:0;z-index:100;position:sticky}
.progress-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .6s;width:0%}
.progress-labels{display:flex;justify-content:space-between;font-size:.6rem;color:var(--dim);margin-top:3px}
.main{max-width:800px;margin:0 auto;padding:14px}
.section{display:none;animation:fadeIn .5s}.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin:10px 0}
.card h2{font-size:1.1rem;margin-bottom:8px;color:#fff}
.card h3{font-size:.9rem;margin:10px 0 6px;color:var(--accent)}
.card p,.card li{font-size:.82rem;line-height:1.6;color:var(--dim);margin-bottom:5px}
.card ul{padding-left:16px}
.hero-img{width:100%;border-radius:10px;margin:10px 0;max-height:220px;object-fit:cover}
.highlight{background:rgba(59,130,246,.12);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:.8rem}
.highlight.green{background:rgba(16,185,129,.1);border-color:var(--green)}
.highlight.amber{background:rgba(245,158,11,.1);border-color:var(--amber)}
.highlight.purple{background:rgba(139,92,246,.1);border-color:var(--accent2)}
.highlight.red{background:rgba(239,68,68,.08);border-color:var(--red)}
.concept-box{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:10px;margin:8px 0}
.concept-box .label{font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:var(--accent2);font-weight:700;margin-bottom:3px}
.concept-box .def{font-size:.78rem;color:var(--text)}
.btn{display:inline-block;padding:9px 20px;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;transition:.2s;font-family:inherit}
.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-next{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;margin-top:12px;padding:11px 28px;font-size:.88rem;border-radius:10px;box-shadow:0 4px 15px rgba(59,130,246,.3)}
.btn-next:hover{box-shadow:0 6px 20px rgba(59,130,246,.45)}
.btn-back{background:transparent;border:2px solid var(--border);color:var(--dim);margin-top:12px;padding:10px 22px;font-size:.82rem;border-radius:10px}
.btn-back:hover{border-color:var(--accent);color:var(--text)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px}
.nav-row .spacer{flex:1}
.btn-primary{background:var(--accent);color:#fff}
.quiz-option{display:block;width:100%;text-align:left;padding:10px 14px;margin:5px 0;border-radius:8px;border:2px solid var(--border);background:rgba(255,255,255,.02);color:var(--text);font-size:.8rem;cursor:pointer;transition:.2s;font-family:inherit}
.quiz-option:hover:not(.locked){border-color:var(--accent);background:rgba(59,130,246,.06)}
.quiz-option.correct{border-color:var(--green)!important;background:rgba(16,185,129,.12)!important}
.quiz-option.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.08)!important}
.quiz-option.locked{cursor:default}
.quiz-option.picked{border-color:var(--accent)!important;background:rgba(59,130,246,.1)!important}
.btn-reveal{background:linear-gradient(135deg,var(--amber),#d97706);color:#fff;margin-top:8px;padding:8px 18px;font-size:.8rem;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:700;display:none}
.btn-reveal.show{display:inline-block;animation:fadeIn .3s}
.feedback{padding:8px 12px;border-radius:8px;margin:6px 0;font-size:.78rem;display:none}
.feedback.show{display:block;animation:fadeIn .3s}
.feedback.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.feedback.nok{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
select.fill-select{background:var(--bg);border:1px solid var(--accent);color:var(--gold);padding:3px 6px;border-radius:4px;font-family:inherit;font-size:.8rem;font-weight:600}
.story-box{background:linear-gradient(135deg,rgba(30,41,59,.9),rgba(15,23,42,.95));border:1px solid var(--border);border-radius:12px;padding:20px;margin:10px 0;font-size:.85rem;line-height:1.8;color:#cbd5e1}
.story-box .title{font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:10px;text-align:center}
.story-box p{margin-bottom:8px;text-indent:1.5em}
.badge{display:inline-block;font-size:.6rem;padding:2px 6px;border-radius:10px;font-weight:700;margin-left:4px}
.badge-loc{background:rgba(59,130,246,.2);color:#93c5fd}
.badge-inf{background:rgba(139,92,246,.2);color:#c4b5fd}
.badge-ref{background:rgba(16,185,129,.2);color:#6ee7b7}
.puzzle-item{background:rgba(255,255,255,.03);border:2px solid var(--border);border-radius:8px;padding:10px;text-align:center;font-size:.78rem;cursor:pointer;transition:.2s;user-select:none}
.puzzle-item:hover{border-color:var(--accent2)}
.puzzle-item.selected{border-color:var(--gold);background:rgba(251,191,36,.06);box-shadow:0 0 10px rgba(251,191,36,.12)}
.puzzle-item.matched{border-color:var(--green);background:rgba(16,185,129,.08);cursor:default}
.match-container{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:10px 0}
.match-left,.match-right{display:flex;flex-direction:column;gap:6px}
.game-score{text-align:center;font-size:1.8rem;font-weight:900;color:var(--gold);margin:8px 0}
.simce-q{border-left:3px solid var(--accent);padding-left:12px;margin:10px 0}
.simce-q .q-num{font-size:.65rem;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.simce-q .q-text{font-size:.82rem;color:#fff;font-weight:600;margin-bottom:6px}
.section-header{text-align:center;padding:14px 0 8px}
.section-header .icon{font-size:2.2rem;margin-bottom:6px}
.section-header h2{font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.section-header .sub{font-size:.75rem;color:var(--dim);margin-top:3px}
.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.cols-2,.match-container{grid-template-columns:1fr}}
.achievement{background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(245,158,11,.06));border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:14px;text-align:center;margin:10px 0;animation:fadeIn .5s}
.achievement h3{color:var(--gold);font-size:.95rem}.achievement p{color:var(--dim);font-size:.75rem;margin-top:3px}
.timer{font-size:.72rem;color:var(--amber);font-weight:600}
.step-indicator{display:flex;gap:5px;justify-content:center;margin:8px 0}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.step-dot.active{background:var(--accent)}.step-dot.done{background:var(--green)}
.audit-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px;margin:8px 0;font-size:.72rem;color:var(--dim)}
.audit-box strong{color:var(--accent)}
.phase-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:700;margin:4px 2px}
.phase-motiv{background:rgba(245,158,11,.15);color:var(--amber)}
.phase-prev{background:rgba(139,92,246,.15);color:#c4b5fd}
.phase-dev{background:rgba(59,130,246,.15);color:#93c5fd}
.phase-close{background:rgba(16,185,129,.15);color:#6ee7b7}
.diff-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700}
.diff-n1{background:rgba(16,185,129,.15);color:#6ee7b7}
.diff-n2{background:rgba(59,130,246,.15);color:#93c5fd}
.text-toggle{background:var(--panel);border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden}
.text-toggle summary{padding:12px 16px;cursor:pointer;font-weight:700;font-size:.85rem;color:var(--accent);list-style:none;display:flex;align-items:center;gap:8px}
.text-toggle summary::before{content:'▶';font-size:.7rem;transition:transform .2s}
.text-toggle[open] summary::before{transform:rotate(90deg)}
.text-toggle .story-box{margin:0;border:none;border-top:1px solid var(--border);border-radius:0}
/* === MEJORAS V2 === */
.hl-fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--amber),#d97706);color:#fff;border:none;font-size:1.5rem;cursor:pointer;z-index:200;box-shadow:0 4px 15px rgba(245,158,11,.4);transition:.3s;display:flex;align-items:center;justify-content:center}
.hl-fab:hover{transform:scale(1.1);box-shadow:0 6px 25px rgba(245,158,11,.6)}
.hl-fab.open{background:linear-gradient(135deg,var(--red),#dc2626)}
.hl-panel{position:fixed;bottom:82px;right:14px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;z-index:200;display:none;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:slideUp .3s}
.hl-panel.show{display:block}
.hl-panel h4{font-size:.72rem;color:var(--dim);margin-bottom:8px;text-align:center}
.hl-colors{display:flex;gap:10px;justify-content:center}.hl-color-wrap{text-align:center}
.hl-btn{width:38px;height:38px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.2s;font-weight:800;font-size:.8rem;font-family:inherit;display:flex;align-items:center;justify-content:center}
.hl-btn:hover{transform:scale(1.15)}.hl-btn.active{border-color:#fff;box-shadow:0 0 14px currentColor}
.hl-btn-loc{background:rgba(251,191,36,.65);color:#78350f}.hl-btn-inf{background:rgba(139,92,246,.65);color:#fff}
.hl-btn-ref{background:rgba(16,185,129,.65);color:#fff}
.hl-btn-clr{background:var(--border);color:var(--dim);font-size:1rem}
.hl-lbl{font-size:.55rem;color:var(--dim);margin-top:3px}
mark.hl-loc{background:rgba(251,191,36,.28);border-radius:2px;padding:0 2px}
mark.hl-inf{background:rgba(139,92,246,.28);border-radius:2px;padding:0 2px}
mark.hl-ref{background:rgba(16,185,129,.28);border-radius:2px;padding:0 2px}
.confetti-box{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.conf-p{position:absolute;top:-12px;opacity:.95}
@keyframes confDrop{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(.2);opacity:0}}
@keyframes xpPop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.xp-pop{animation:xpPop .35s ease-out}
.quiz-option.wrong{animation:qShake .4s}
@keyframes qShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
@media(max-width:600px){.how-grid{grid-template-columns:repeat(2,1fr)}}
.how-step{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;transition:.2s}
.how-step:hover{border-color:var(--accent);background:rgba(59,130,246,.04)}
.hw-icon{font-size:1.5rem;margin-bottom:4px}
.hw-title{font-size:.72rem;font-weight:700;color:var(--text)}.hw-desc{font-size:.6rem;color:var(--dim);margin-top:2px;line-height:1.3}
.task-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(139,92,246,.08));border:1px solid rgba(59,130,246,.2);border-radius:20px;padding:4px 14px;font-size:.7rem;font-weight:700;color:var(--accent);margin:8px 0}
.hl-tip{background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.04));border:1px solid rgba(251,191,36,.2);border-radius:10px;padding:10px 14px;margin:8px 0;font-size:.75rem;color:var(--amber);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.hl-tip strong{color:var(--text)}
</style>
</head>
<body>
<div class="top-bar">
<h1>📖 SIMCE S5 — El Cuento · NM2</h1>
<div style="display:flex;align-items:center;gap:10px">
<span class="timer" id="timer">⏱ 75:00</span>
<span class="xp" id="xp-display">⭐ 0 XP</span>
</div>
</div>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="progress-labels"><span>Motivación</span><span>Conocimientos</span><span>Lección</span><span>Lectura</span><span>Puzzle</span><span>Juego</span><span>SIMCE</span><span>Cierre</span></div>
</div>
<div class="main" id="app"></div>

<script>
let xp=0,currentSection=0,timerSeconds=75*60,timerInterval=null;
const S=['welcome','motivation','prevknow','lesson','reading','puzzle','game','simce','closing'];
const adminMode=new URLSearchParams(window.location.search).get('r')==='1';
function addXP(n){xp+=n;const d=document.getElementById('xp-display');d.textContent='⭐ '+xp+' XP';d.classList.remove('xp-pop');void d.offsetHeight;d.classList.add('xp-pop');}
function updateProgress(){document.getElementById('progress').style.width=((currentSection/(S.length-1))*100)+'%';}
function startTimer(){timerInterval=setInterval(()=>{timerSeconds--;if(timerSeconds<=0){clearInterval(timerInterval);return;}const m=Math.floor(timerSeconds/60),s=timerSeconds%60;document.getElementById('timer').textContent='⏱ '+m+':'+(s<10?'0':'')+s;},1000);}
function go(i){currentSection=i;updateProgress();document.getElementById('app').innerHTML=B[S[i]]();window.scrollTo({top:0,behavior:'smooth'});if(i===1&&!timerInterval)startTimer();if(i===6&&gIdx>=GQ.length&&gLives>0)setTimeout(launchConfetti,400);if(i===7&&sIdx>=SQ.length)setTimeout(launchConfetti,400);requestAnimationFrame(function(){document.querySelectorAll('.quiz-option').forEach(function(el,idx){el.style.opacity='0';el.style.transform='translateX(-10px)';setTimeout(function(){el.style.transition='opacity .3s,transform .3s';el.style.opacity='1';el.style.transform='translateX(0)';},idx*70+80);});});}
const B={};

// ===== WELCOME =====
B.welcome=()=>`
<div class="section-header"><div class="icon">🚀</div><h2>Clase 5 SIMCE — El Cuento</h2><div class="sub">75 minutos · Chromebook · Interactiva</div></div>
<div class="card">
<h2>🎯 Objetivo de la clase</h2>
<div class="highlight">Analizar la <strong>estructura y los elementos narrativos</strong> de un cuento (narrador, personajes, espacio, tiempo, conflicto), mediante lectura guiada y ejercicios interactivos, fortaleciendo las habilidades de <strong>Localizar, Inferir y Reflexionar</strong>.</div>
<h3>👆 ¿Cómo funciona esta guía?</h3>
<div class="how-grid">
<div class="how-step"><div class="hw-icon">📖</div><div class="hw-title">Lee</div><div class="hw-desc">Lee los textos con calma</div></div>
<div class="how-step"><div class="hw-icon">🖍️</div><div class="hw-title">Resalta</div><div class="hw-desc">Usa los lápices de colores para marcar pistas</div></div>
<div class="how-step"><div class="hw-icon">✍️</div><div class="hw-title">Responde</div><div class="hw-desc">Elige tu respuesta y revisa</div></div>
<div class="how-step"><div class="hw-icon">⭐</div><div class="hw-title">Gana XP</div><div class="hw-desc">Cada acierto suma puntos</div></div>
</div>
<h3>Ruta de la clase</h3>
<ul>
<li><span class="phase-tag phase-motiv">5 min</span> <strong>Motivación</strong> — Video pregunta + reflexión</li>
<li><span class="phase-tag phase-prev">6 min</span> <strong>Conocimientos previos</strong> — Flashback SIMCE (3 preguntas)</li>
<li><span class="phase-tag phase-dev">52 min</span> <strong>Desarrollo</strong> — Lección + Lectura + Puzzle + Juego + Práctica SIMCE</li>
<li><span class="phase-tag phase-close">7 min</span> <strong>Cierre y reflexión</strong> — Ticket de salida + Metacognición</li>
</ul>
<div style="text-align:center"><button class="btn btn-next" onclick="go(1)">¡Comenzar! →</button></div>
</div>`;

// ===== MOTIVACIÓN =====
B.motivation=()=>`
<div class="section-header"><div class="icon">💡</div><h2>Motivación</h2><div class="sub"><span class="phase-tag phase-motiv">5 minutos</span></div></div>
<div class="card">
<h2>¿Alguna vez una historia te cambió?</h2>
<div class="task-badge">📝 Tu tarea: piensa y reflexiona</div>
<p>Piensa en alguna historia que te haya contado un abuelo, un padre o alguien cercano. Una historia que recuerdes hasta hoy.</p>
<div class="highlight amber">🤔 <strong>Pregunta para pensar:</strong> ¿Por qué algunas historias se nos quedan grabadas para siempre mientras otras las olvidamos al día siguiente?</div>
<p>Hoy vamos a descubrir qué hace que un cuento funcione, qué piezas tiene por dentro, como un reloj. Vamos a <strong>desarmar un cuento</strong> pieza por pieza y entender cómo cada elemento construye la historia.</p>
<div class="highlight green">📖 Al final de esta clase, serás capaz de leer un cuento en la prueba SIMCE y saber exactamente <strong>dónde buscar</strong> cada respuesta.</div>
<div class="nav-row"><button class="btn btn-back" onclick="go(0)">← Inicio</button><button class="btn btn-next" onclick="go(2)">Conocimientos Previos →</button></div>
</div>`;

// ===== CONOCIMIENTOS PREVIOS (FLASHBACK) =====
const fbQs=[
{q:'Un reportaje sobre contaminación en Talca señala: "Según datos del MMA 2024, el 73% de las emisiones de material particulado en la Región del Maule provienen del uso de leña húmeda durante el invierno." ¿Cuál es la función principal de la referencia "según datos del MMA 2024" dentro del texto?',opts:['Indicar que el problema de contaminación es exclusivo de la Región del Maule y no ocurre en otras zonas','Contextualizar cronológicamente el reportaje para que el lector sepa en qué año fue escrito','Respaldar la afirmación con una fuente institucional, otorgando credibilidad al dato presentado','Alertar al lector de que los datos podrían estar desactualizados al provenir de un año específico'],correct:2,skill:'LOC',explain:'La referencia a una fuente oficial (MMA) da credibilidad. A cambia el foco al alcance geográfico. B confunde fecha de fuente con fecha del reportaje. D interpreta la fecha como advertencia de caducidad, sin evidencia.',diff:'N2'},
{q:'"María cerró la puerta sin hacer ruido y caminó de puntillas, conteniendo la respiración." ¿Qué se puede inferir sobre la situación de María?',opts:['Que se encuentra en un estado de nerviosismo intenso y quiere escapar del lugar cuanto antes','Que intenta pasar desapercibida porque no quiere que alguien note su presencia o movimiento','Que actúa con cuidado porque el piso de la casa está en mal estado y teme caerse','Que está jugando a las escondidas con alguien y forma parte de una actividad recreativa'],correct:1,skill:'INF',explain:'Las tres acciones (sin ruido, puntillas, contener respiración) convergen en evitar ser percibida. A sobregeneraliza: infiere "escapar" sin evidencia. C inventa una causa física no mencionada. D inventa un contexto lúdico sin sustento.',diff:'N1'},
{q:'"Prohibir los celulares en las salas es la ÚNICA solución para mejorar el bajo rendimiento escolar." ¿Qué debilidad argumentativa presenta esta afirmación?',opts:['Confunde causa y efecto, ya que el rendimiento bajo podría ser la razón del uso excesivo de celulares','Presenta una sola medida como solución absoluta para un problema que tiene múltiples causas','Carece de evidencia empírica porque no cita estudios que respalden la relación celular-rendimiento','Utiliza un tono demasiado autoritario que descalifica la opinión de los estudiantes sobre el tema'],correct:1,skill:'REF',explain:'El uso de "ÚNICA" es una sobregeneralización: reduce un problema multicausal a una sola solución. A confunde la dirección causal (plausible pero no es la debilidad principal). C señala falta de evidencia, pero la debilidad central es el absolutismo. D evalúa tono, no estructura lógica.',diff:'N1-N2'}
];
let fbDone=0;
B.prevknow=()=>{
let h=`<div class="section-header"><div class="icon">⚡</div><h2>Activación de Conocimientos Previos</h2><div class="sub"><span class="phase-tag phase-prev">6 minutos</span> · Flashback SIMCE — 3 preguntas de clases anteriores</div></div>
<div class="task-badge">📝 Tu tarea: responde 3 preguntas de repaso</div>
<div class="highlight">Estas preguntas activan lo que ya sabes de las clases S2 (Localizar), S3 (Inferir) y S4 (Reflexionar). Lee con calma, descarta lo que NO calza y luego elige.</div>`;
fbQs.forEach((q,i)=>{

B.reading=()=>`
<div class="section-header"><div class="icon">📖</div><h2>Lectura: "La cicatriz"</h2><div class="sub"><span class="phase-tag phase-dev">Desarrollo</span> · Lee con atención</div></div>
<div class="task-badge">📝 Tu tarea: lee el cuento y busca pistas</div>
<div class="highlight amber">💡 <strong>Mientras lees, identifica:</strong> ¿Quién narra? ¿Dónde ocurre? ¿Cuál es el conflicto? ¿Qué tema transmite?</div>
<div class="hl-tip">🖍️ <strong>Usa los lápices:</strong> toca el botón 🖍️ abajo a la derecha, elige un color y selecciona texto para resaltarlo. <span style="background:rgba(251,191,36,.3);padding:1px 5px;border-radius:4px">Amarillo</span> = dato explícito · <span style="background:rgba(139,92,246,.3);padding:1px 5px;border-radius:4px">Morado</span> = pista para inferir · <span style="background:rgba(16,185,129,.3);padding:1px 5px;border-radius:4px">Verde</span> = reflexión</div>
<div class="story-box">
<div class="title">La cicatriz</div>
<p>Cada vez que mi abuela levantaba las manos para amasar el pan, yo no podía dejar de mirar la cicatriz que cruzaba su muñeca izquierda, delgada y plateada como un río dibujado sobre un mapa antiguo.</p>
<p>—Abuela, ¿cómo te hiciste eso? —le pregunté una tarde de invierno, mientras el olor a masa cruda llenaba la cocina.</p>
<p>Ella sonrió sin mirarme, hundiendo los nudillos en la masa con una fuerza que desmentía sus setenta y tres años.</p>
<p>—Fue por una promesa —respondió.</p>
<p>Yo tenía doce años y las promesas me parecían cosas de películas. Me senté en el banco de madera y esperé, porque había aprendido que mi abuela contaba las historias a su propio ritmo, como quien desenrolla un ovillo de lana.</p>
<p>—Cuando yo era joven, más joven que tú —comenzó—, vivíamos cerca del río Maule. Mi hermano Rodrigo y yo éramos inseparables. Un verano, el río creció por las lluvias y arrastró el puente viejo. Al otro lado quedó atrapada la señora Carmen con sus tres hijos pequeños, sin comida ni manera de cruzar.</p>
<p>Hizo una pausa para espolvorear harina sobre la mesa. Yo contuve la respiración.</p>
<p>—Tu bisabuelo dijo que era imposible cruzar. El agua estaba helada y la corriente era brutal. Pero Rodrigo y yo nos miramos y supimos, sin decirnos nada, que teníamos que intentarlo.</p>
<p>—¿Cruzaron el río? —pregunté, con los ojos abiertos de asombro.</p>
<p>—Amarramos una cuerda al sauce viejo de la orilla. Rodrigo iba primero, yo le sujetaba la cuerda desde atrás. A mitad del cruce, un tronco que venía con la corriente me golpeó el brazo y la cuerda me cortó la muñeca. Pero no la solté.</p>
</div>
<div class="story-box">
<p>Sus ojos brillaron con algo que no era tristeza, sino algo más firme, como el orgullo de quien sabe que tomó la decisión correcta.</p>
<p>—¿Y Rodrigo? —susurré.</p>
<p>—Llegó al otro lado. Ayudó a la señora Carmen y a sus hijos a cruzar con la cuerda. Todos sobrevivieron.</p>
<p>Mi abuela levantó la muñeca y la giró lentamente bajo la luz amarillenta de la cocina.</p>
<p>—Yo me quedé con esto —dijo, tocando la cicatriz—. Y con la certeza de que hay momentos en la vida en que soltar es más fácil, pero sostener es lo correcto.</p>
<p>Terminó de dar forma al pan y lo puso en la bandeja. Antes de meterlo al horno, me miró con esos ojos oscuros que parecían contener todas las tormentas y todas las calmas del mundo.</p>
<p>—Algún día, mi niño, algo te va a pedir que no sueltes. Y cuando eso pase, acuérdate de esta cicatriz.</p>
<p>Han pasado quince años desde esa tarde. Mi abuela ya no está, pero cada vez que la vida me pide soltar, cierro los ojos y siento su mano firme, sosteniendo la cuerda.</p>
</div>
<div class="audit-box"><strong>Texto:</strong> 450 palabras · <span class="diff-tag diff-n2">N2</span> · Narrativo · Lenguaje figurado accesible · Estructura temporal: presente → flashback → presente</div>
<div class="nav-row"><button class="btn btn-back" onclick="go(3)">← Volver a Lección</button><button class="btn btn-next" onclick="go(5)">Analizar el cuento →</button></div>`;

const GQ=[
{q:'El texto dice que la cicatriz era "delgada y plateada como un río dibujado sobre un mapa antiguo". ¿Qué figura literaria predomina en esta expresión?',opts:['Comparación, porque establece una semejanza explícita usando la partícula "como"','Metáfora, porque reemplaza el término real por uno imaginario sin nexo comparativo','Hipérbole, porque exagera el tamaño de la cicatriz al compararla con un río','Personificación, porque atribuye características humanas a la cicatriz'],correct:0,explain:'La partícula "como" establece un nexo comparativo explícito: cicatriz como río. B falla porque sí hay nexo. C falla porque no hay exageración de tamaño. D falla porque no se le atribuyen acciones humanas.',diff:'N2'},

{q:'¿Qué tipo de conflicto enfrenta la abuela cuando joven en el episodio del río?',opts:['Personaje vs. sí mismo, porque debe decidir internamente si arriesgarse o no','Personaje vs. sociedad, porque desafía la orden de su padre de no cruzar el río','Personaje vs. destino, porque la crecida del río estaba fuera de su control','Personaje vs. naturaleza, porque debe enfrentar la corriente y el frío del río para cruzar'],correct:3,explain:'El obstáculo concreto es el río (naturaleza): corriente, frío, troncos. A reduce el conflicto a la decisión interna, pero la acción central es física. B cambia el foco al padre. C confunde la causa con el antagonista.',diff:'N2'},

<div class="story-box" style="max-height:250px;overflow-y:auto;font-size:.78rem;line-height:1.7;margin-bottom:12px"><div class="title" style="font-size:.9rem">📖 La cicatriz</div><p>Cada vez que mi abuela levantaba las manos para amasar el pan, yo no podía dejar de mirar la cicatriz que cruzaba su muñeca izquierda, delgada y plateada como un río dibujado sobre un mapa antiguo.</p><p>—Abuela, ¿cómo te hiciste eso? —le pregunté una tarde de invierno, mientras el olor a masa cruda llenaba la cocina.</p><p>Ella sonrió sin mirarme, hundiendo los nudillos en la masa con una fuerza que desmentía sus setenta y tres años.</p><p>—Fue por una promesa —respondió.</p><p>Yo tenía doce años y las promesas me parecían cosas de películas. Me senté en el banco de madera y esperé, porque había aprendido que mi abuela contaba las historias a su propio ritmo, como quien desenrolla un ovillo de lana.</p><p>—Cuando yo era joven, más joven que tú —comenzó—, vivíamos cerca del río Maule. Mi hermano Rodrigo y yo éramos inseparables. Un verano, el río creció por las lluvias y arrastró el puente viejo. Al otro lado quedó atrapada la señora Carmen con sus tres hijos pequeños, sin comida ni manera de cruzar.</p><p>Hizo una pausa para espolvorear harina sobre la mesa. Yo contuve la respiración.</p><p>—Tu bisabuelo dijo que era imposible cruzar. El agua estaba helada y la corriente era brutal. Pero Rodrigo y yo nos miramos y supimos, sin decirnos nada, que teníamos que intentarlo.</p><p>—¿Cruzaron el río? —pregunté, con los ojos abiertos de asombro.</p><p>—Amarramos una cuerda al sauce viejo de la orilla. Rodrigo iba primero, yo le sujetaba la cuerda desde atrás. A mitad del cruce, un tronco que venía con la corriente me golpeó el brazo y la cuerda me cortó la muñeca. Pero no la solté.</p><p>Sus ojos brillaron con algo que no era tristeza, sino algo más firme, como el orgullo de quien sabe que tomó la decisión correcta.</p><p>—¿Y Rodrigo? —susurré.</p><p>—Llegó al otro lado. Ayudó a la señora Carmen y a sus hijos a cruzar con la cuerda. Todos sobrevivieron.</p><p>Mi abuela levantó la muñeca y la giró lentamente bajo la luz amarillenta de la cocina.</p><p>—Yo me quedé con esto —dijo, tocando la cicatriz—. Y con la certeza de que hay momentos en la vida en que soltar es más fácil, pero sostener es lo correcto.</p><p>Terminó de dar forma al pan y lo puso en la bandeja. Antes de meterlo al horno, me miró con esos ojos oscuros que parecían contener todas las tormentas y todas las calmas del mundo.</p><p>—Algún día, mi niño, algo te va a pedir que no sueltes. Y cuando eso pase, acuérdate de esta cicatriz.</p><p>Han pasado quince años desde esa tarde. Mi abuela ya no está, pero cada vez que la vida me pide soltar, cierro los ojos y siento su mano firme, sosteniendo la cuerda.</p></div>

(function(){var fab=document.createElement('button');fab.className='hl-fab';fab.id='hl-fab';fab.innerHTML='🖍️';fab.onclick=function(){var p=document.getElementById('hl-panel');p.classList.toggle('show');this.classList.toggle('open');this.innerHTML=this.classList.contains('open')?'✕':'🖍️';};var panel=document.createElement('div');panel.className='hl-panel';panel.id='hl-panel';panel.innerHTML='<h4>🖍️ Selecciona un color y resalta texto</h4><div class="hl-colors"><div class="hl-color-wrap"><button class="hl-btn hl-btn-loc" data-hl="loc">L</button><div class="hl-lbl">Localizar</div></div><div class="hl-color-wrap"><button class="hl-btn hl-btn-inf" data-hl="inf">I</button><div class="hl-lbl">Inferir</div></div><div class="hl-color-wrap"><button class="hl-btn hl-btn-ref" data-hl="ref">R</button><div class="hl-lbl">Reflexionar</div></div><div class="hl-color-wrap"><button class="hl-btn hl-btn-clr" data-hl="clear">✕</button><div class="hl-lbl">Borrar</div></div></div>';document.body.appendChild(fab);document.body.appendChild(panel);panel.querySelectorAll('[data-hl]').forEach(function(b){b.onclick=function(){if(this.dataset.hl==='clear')clearHL();else setHL(this.dataset.hl);};});document.addEventListener('mouseup',function(){setTimeout(applyHL,10);});document.addEventListener('touchend',function(){setTimeout(applyHL,80);});})();
window.setHL=function(c){hlColor=hlColor===c?null:c;document.querySelectorAll('.hl-btn').forEach(function(b){b.classList.remove('active');});if(hlColor)document.querySelector('.hl-btn-'+hlColor).classList.add('active');};
function applyHL(){if(!hlColor)return;var s=window.getSelection();if(!s.rangeCount||s.isCollapsed)return;var r=s.getRangeAt(0);var a=r.commonAncestorContainer;if(a.nodeType===3)a=a.parentElement;if(!a||!a.closest||(!a.closest('.story-box')&&!a.closest('.card')))return;try{var m=document.createElement('mark');m.className='hl-'+hlColor;r.surroundContents(m);}catch(e){}s.removeAllRanges();}
window.clearHL=function(){document.querySelectorAll('mark[class^="hl-"]').forEach(function(m){var t=document.createTextNode(m.textContent);m.parentNode.replaceChild(t,m);});document.querySelectorAll('.hl-btn').forEach(function(b){b.classList.remove('active');});hlColor=null;};

go(0);
</script>
</body>
</html>
