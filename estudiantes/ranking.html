<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking — Plataforma Estudiantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; background:#f1f5f9; min-height:100vh; }
        .header {
            background:linear-gradient(135deg,#1e3a5f,#1e40af); color:#fff;
            padding:14px 20px; display:flex; align-items:center; gap:10px;
            position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.15);
        }
        .header a { color:#fff; text-decoration:none; font-size:20px; padding:4px; }
        .header h1 { font-size:16px; font-weight:700; }
        .main { max-width:800px; margin:0 auto; padding:24px 16px; }
        /* COURSE COMPARISON */
        .comparison {
            background:#fff; border-radius:16px; padding:28px; box-shadow:0 2px 8px rgba(0,0,0,.08);
            margin-bottom:24px; text-align:center;
        }
        .comparison h2 { font-size:18px; font-weight:800; color:#0f172a; margin-bottom:20px; }
        .vs-container { display:flex; align-items:center; justify-content:center; gap:24px; }
        .course-block { flex:1; max-width:240px; }
        .course-block .course-name { font-size:16px; font-weight:800; margin-bottom:8px; }
        .course-block .course-pct {
            font-size:42px; font-weight:800; line-height:1;
        }
        .course-block .course-sub { font-size:12px; color:#64748b; margin-top:4px; }
        .course-block.a .course-name { color:#1e40af; }
        .course-block.a .course-pct { color:#1e40af; }
        .course-block.b .course-name { color:#7c3aed; }
        .course-block.b .course-pct { color:#7c3aed; }
        .vs-badge {
            width:48px; height:48px; background:#f1f5f9; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:16px; font-weight:800; color:#94a3b8;
        }
        .winner-banner {
            margin-top:16px; padding:8px 16px; border-radius:8px;
            font-size:13px; font-weight:700; display:inline-block;
        }
        .winner-banner.a { background:#dbeafe; color:#1e40af; }
        .winner-banner.b { background:#ede9fe; color:#7c3aed; }
        .winner-banner.tie { background:#f1f5f9; color:#64748b; }
        /* TABS */
        .tabs { display:flex; gap:8px; margin-bottom:16px; }
        .tab {
            padding:10px 20px; border-radius:8px; font-size:13px; font-weight:700;
            cursor:pointer; border:2px solid #e2e8f0; background:#fff; color:#64748b;
            transition:all .2s; font-family:inherit;
        }
        .tab.active { background:#1e40af; color:#fff; border-color:#1e40af; }
        .tab:hover:not(.active) { background:#f8fafc; border-color:#cbd5e1; }
        /* SESSION SELECTOR */
        .session-select { margin-bottom:16px; }
        .session-select select {
            padding:10px 16px; border:2px solid #e2e8f0; border-radius:8px;
            font-size:14px; font-family:inherit; background:#fff; cursor:pointer;
            min-width:250px;
        }
        /* TABLE */
        .ranking-table { width:100%; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
        .ranking-table table { width:100%; border-collapse:collapse; }
        .ranking-table th {
            background:#f8fafc; padding:12px 16px; text-align:left;
            font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase;
            letter-spacing:.5px; border-bottom:2px solid #e2e8f0;
        }
        .ranking-table td { padding:12px 16px; font-size:14px; border-bottom:1px solid #f1f5f9; }
        .ranking-table tr:hover td { background:#f8fafc; }
        .ranking-table tr.highlight td { background:#eff6ff; font-weight:600; }
        .pos-badge {
            display:inline-flex; align-items:center; justify-content:center;
            width:30px; height:30px; border-radius:8px; font-weight:800; font-size:13px;
        }
        .pos-1 { background:#fef08a; color:#854d0e; }
        .pos-2 { background:#e2e8f0; color:#475569; }
        .pos-3 { background:#fed7aa; color:#9a3412; }
        .pos-other { background:#f1f5f9; color:#94a3b8; }
        .pct-bar { display:flex; align-items:center; gap:8px; }
        .pct-bar .bar { height:8px; border-radius:4px; background:#dbeafe; flex:1; max-width:100px; overflow:hidden; }
        .pct-bar .bar .fill { height:100%; border-radius:4px; background:#3b82f6; }
        .pct-bar .value { font-weight:700; font-size:13px; color:#1e40af; min-width:40px; }
        .empty-state { text-align:center; padding:40px; color:#94a3b8; font-size:14px; }
        @media (max-width:640px) {
            .vs-container { flex-direction:column; gap:12px; }
            .ranking-table td, .ranking-table th { padding:8px 10px; font-size:12px; }
            .tabs { flex-wrap:wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="dashboard.html">←</a>
        <h1>🏆 Ranking entre Cursos</h1>
    </div>

    <div class="main">
        <!-- Course Comparison -->
        <div class="comparison" id="comparison">
            <h2>Comparación General</h2>
            <div class="vs-container">
                <div class="course-block a">
                    <div class="course-name">2°A HC</div>
                    <div class="course-pct" id="globalA">-</div>
                    <div class="course-sub">promedio general</div>
                </div>
                <div class="vs-badge">VS</div>
                <div class="course-block b">
                    <div class="course-name">2°B HC</div>
                    <div class="course-pct" id="globalB">-</div>
                    <div class="course-sub">promedio general</div>
                </div>
            </div>
            <div id="winnerBanner"></div>
        </div>

        <!-- Session Selector -->
        <div class="session-select">
            <select id="sessionSelect" onchange="loadRanking()">
                <option value="all">Todas las sesiones (promedio)</option>
            </select>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="2A-HC" onclick="switchTab(this)">2°A HC</button>
            <button class="tab" data-tab="2B-HC" onclick="switchTab(this)">2°B HC</button>
            <button class="tab" data-tab="all" onclick="switchTab(this)">Todos</button>
        </div>

        <!-- Ranking Table -->
        <div class="ranking-table" id="rankingTable">
            <div class="empty-state">Cargando ranking...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCzN4xNEE_hKshXbsVqLhWSnzet1pHwRh8",
            authDomain: "profe-blog.firebaseapp.com",
            databaseURL: "https://profe-blog-default-rtdb.firebaseio.com",
            projectId: "profe-blog",
            storageBucket: "profe-blog.firebasestorage.app",
            messagingSenderId: "305920739217",
            appId: "1:305920739217:web:2e08c7469d2988d8b3bc30"
        };
        firebase.initializeApp(FIREBASE_CONFIG);
        const auth = firebase.auth();
        const db = firebase.database();
        const BASE = 'plataforma_estudiantes';

        let allStudents = {};
        let allResults = {};
        let allSessions = {};
        let currentUid = null;
        let currentTab = '2A-HC';

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;
            await loadData();
        });

        async function loadData() {
            try {
                const [estSnap, resSnap, sesSnap] = await Promise.all([
                    db.ref(BASE + '/estudiantes').once('value'),
                    db.ref(BASE + '/resultados').once('value'),
                    db.ref(BASE + '/sesiones').once('value')
                ]);
                allStudents = estSnap.val() || {};
                allResults = resSnap.val() || {};
                allSessions = sesSnap.val() || {};

                // Populate session dropdown
                const select = document.getElementById('sessionSelect');
                Object.entries(allSessions).forEach(([id, ses]) => {
                    if (ses.activa !== false) {
                        const opt = document.createElement('option');
                        opt.value = id;
                        opt.textContent = ses.titulo || id;
                        select.appendChild(opt);
                    }
                });

                loadRanking();
                loadComparison();
            } catch(e) { console.error(e); }
        }

        function loadComparison() {
            const courseAvgs = { '2A-HC': [], '2B-HC': [] };
            for (const [uid, est] of Object.entries(allStudents)) {
                if (!courseAvgs[est.curso]) continue;
                let total = 0, count = 0;
                for (const sesId of Object.keys(allResults)) {
                    if (allResults[sesId][uid]) {
                        total += allResults[sesId][uid].porcentaje || 0;
                        count++;
                    }
                }
                if (count > 0) courseAvgs[est.curso].push(total / count);
            }

            const avgA = courseAvgs['2A-HC'].length ? Math.round(courseAvgs['2A-HC'].reduce((a,b)=>a+b,0)/courseAvgs['2A-HC'].length) : 0;
            const avgB = courseAvgs['2B-HC'].length ? Math.round(courseAvgs['2B-HC'].reduce((a,b)=>a+b,0)/courseAvgs['2B-HC'].length) : 0;

            document.getElementById('globalA').textContent = avgA + '%';
            document.getElementById('globalB').textContent = avgB + '%';

            const banner = document.getElementById('winnerBanner');
            if (avgA > avgB && avgA > 0) {
                banner.innerHTML = '<div class="winner-banner a">🏆 2°A HC lidera con ' + (avgA - avgB) + ' puntos de ventaja</div>';
            } else if (avgB > avgA && avgB > 0) {
                banner.innerHTML = '<div class="winner-banner b">🏆 2°B HC lidera con ' + (avgB - avgA) + ' puntos de ventaja</div>';
            } else if (avgA > 0) {
                banner.innerHTML = '<div class="winner-banner tie">🤝 ¡Empate técnico!</div>';
            }
        }

        function loadRanking() {
            const selectedSession = document.getElementById('sessionSelect').value;
            const scores = [];

            for (const [uid, est] of Object.entries(allStudents)) {
                let total = 0, count = 0;

                if (selectedSession === 'all') {
                    for (const sesId of Object.keys(allResults)) {
                        if (allResults[sesId][uid]) {
                            total += allResults[sesId][uid].porcentaje || 0;
                            count++;
                        }
                    }
                } else {
                    if (allResults[selectedSession] && allResults[selectedSession][uid]) {
                        total = allResults[selectedSession][uid].porcentaje || 0;
                        count = 1;
                    }
                }

                if (count > 0) {
                    scores.push({
                        uid: uid,
                        nombre: est.nombre,
                        curso: est.curso,
                        promedio: Math.round(total / count),
                        sesiones: count
                    });
                }
            }

            scores.sort((a, b) => b.promedio - a.promedio);
            renderTable(scores);
        }

        function switchTab(btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            loadRanking();
        }

        function renderTable(scores) {
            const container = document.getElementById('rankingTable');
            let filtered = currentTab === 'all' ? scores : scores.filter(s => s.curso === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay resultados disponibles aún.</div>';
                return;
            }

            let html = '<table><thead><tr><th style="width:50px">#</th><th>Estudiante</th><th>Curso</th><th style="width:180px">Logro</th><th style="width:60px">Ses.</th></tr></thead><tbody>';

            filtered.forEach((s, i) => {
                const pos = i + 1;
                const posClass = pos <= 3 ? 'pos-' + pos : 'pos-other';
                const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;
                const isMe = s.uid === currentUid;
                const rowClass = isMe ? 'highlight' : '';
                const cursoLabel = s.curso === '2A-HC' ? '2°A' : '2°B';

                html += `<tr class="${rowClass}">
                    <td><span class="pos-badge ${posClass}">${medal}</span></td>
                    <td>${s.nombre}${isMe ? ' <span style="font-size:10px;color:#1e40af;">(tú)</span>' : ''}</td>
                    <td>${cursoLabel}</td>
                    <td><div class="pct-bar"><div class="bar"><div class="fill" style="width:${s.promedio}%"></div></div><span class="value">${s.promedio}%</span></div></td>
                    <td style="text-align:center; color:#64748b;">${s.sesiones}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
