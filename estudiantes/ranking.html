<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking — Plataforma Estudiantes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; background:#f1f5f9; min-height:100vh; }
        .header {
            background:linear-gradient(135deg,#1e3a5f,#1e40af); color:#fff;
            padding:14px 20px; display:flex; align-items:center; gap:10px;
            position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,.15);
        }
        .header a { color:#fff; text-decoration:none; font-size:20px; padding:4px; }
        .header h1 { font-size:16px; font-weight:700; }
        .main { max-width:800px; margin:0 auto; padding:24px 16px; }
        /* COURSE COMPARISON */
        .comparison {
            background:#fff; border-radius:16px; padding:28px; box-shadow:0 2px 8px rgba(0,0,0,.08);
            margin-bottom:24px; text-align:center;
        }
        .comparison h2 { font-size:18px; font-weight:800; color:#0f172a; margin-bottom:20px; }
        .vs-container { display:flex; align-items:center; justify-content:center; gap:24px; }
        .course-block { flex:1; max-width:240px; }
        .course-block .course-name { font-size:16px; font-weight:800; margin-bottom:8px; }
        .course-block .course-pct {
            font-size:42px; font-weight:800; line-height:1;
        }
        .course-block .course-sub { font-size:12px; color:#64748b; margin-top:4px; }
        .course-block.a .course-name { color:#1e40af; }
        .course-block.a .course-pct { color:#1e40af; }
        .course-block.b .course-name { color:#7c3aed; }
        .course-block.b .course-pct { color:#7c3aed; }
        .vs-badge {
            width:48px; height:48px; background:#f1f5f9; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:16px; font-weight:800; color:#94a3b8;
        }
        .winner-banner {
            margin-top:16px; padding:8px 16px; border-radius:8px;
            font-size:13px; font-weight:700; display:inline-block;
        }
        .winner-banner.a { background:#dbeafe; color:#1e40af; }
        .winner-banner.b { background:#ede9fe; color:#7c3aed; }
        .winner-banner.tie { background:#f1f5f9; color:#64748b; }
        /* TABS */
        .tabs { display:flex; gap:8px; margin-bottom:16px; }
        .tab {
            padding:10px 20px; border-radius:8px; font-size:13px; font-weight:700;
            cursor:pointer; border:2px solid #e2e8f0; background:#fff; color:#64748b;
            transition:all .2s; font-family:inherit;
        }
        .tab.active { background:#1e40af; color:#fff; border-color:#1e40af; }
        .tab:hover:not(.active) { background:#f8fafc; border-color:#cbd5e1; }
        /* SESSION SELECTOR */
        .session-select { margin-bottom:16px; }
        .session-select select {
            padding:10px 16px; border:2px solid #e2e8f0; border-radius:8px;
            font-size:14px; font-family:inherit; background:#fff; cursor:pointer;
            min-width:250px;
        }
        /* TABLE */
        .ranking-table { width:100%; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
        .ranking-table table { width:100%; border-collapse:collapse; }
        .ranking-table th {
            background:#f8fafc; padding:12px 16px; text-align:left;
            font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase;
            letter-spacing:.5px; border-bottom:2px solid #e2e8f0;
        }
        .ranking-table td { padding:12px 16px; font-size:14px; border-bottom:1px solid #f1f5f9; }
        .time-cell { font-variant-numeric:tabular-nums; color:#475569; font-weight:600; font-size:13px; }
        .top10-note { text-align:center; padding:10px; font-size:12px; color:#94a3b8; font-style:italic; }
        .ranking-table tr:hover td { background:#f8fafc; }
        .ranking-table tr.highlight td { background:#eff6ff; font-weight:600; }
        .pos-badge {
            display:inline-flex; align-items:center; justify-content:center;
            width:30px; height:30px; border-radius:8px; font-weight:800; font-size:13px;
        }
        .pos-1 { background:#fef08a; color:#854d0e; }
        .pos-2 { background:#e2e8f0; color:#475569; }
        .pos-3 { background:#fed7aa; color:#9a3412; }
        .pos-other { background:#f1f5f9; color:#94a3b8; }
        .pct-bar { display:flex; align-items:center; gap:8px; }
        .pct-bar .bar { height:8px; border-radius:4px; background:#dbeafe; flex:1; max-width:100px; overflow:hidden; }
        .pct-bar .bar .fill { height:100%; border-radius:4px; background:#3b82f6; }
        .pct-bar .value { font-weight:700; font-size:13px; color:#1e40af; min-width:40px; }
        .empty-state { text-align:center; padding:40px; color:#94a3b8; font-size:14px; }
        @media (max-width:640px) {
            .vs-container { flex-direction:column; gap:12px; }
            .ranking-table td, .ranking-table th { padding:8px 10px; font-size:12px; }
            .tabs { flex-wrap:wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="dashboard.html">←</a>
        <h1>🏆 Ranking entre Cursos</h1>
    </div>

    <div class="main">
        <!-- Course Comparison (dynamic) -->
        <div class="comparison" id="comparison">
            <h2>Comparación General</h2>
            <div class="vs-container">
                <div class="course-block a">
                    <div class="course-name" id="nameA">-</div>
                    <div class="course-pct" id="globalA">-</div>
                    <div class="course-sub">promedio general</div>
                </div>
                <div class="vs-badge">VS</div>
                <div class="course-block b">
                    <div class="course-name" id="nameB">-</div>
                    <div class="course-pct" id="globalB">-</div>
                    <div class="course-sub">promedio general</div>
                </div>
            </div>
            <div id="winnerBanner"></div>
        </div>

        <!-- Session Selector -->
        <div class="session-select">
            <select id="sessionSelect" onchange="loadRanking()">
                <option value="all">Todas las sesiones (promedio)</option>
            </select>
        </div>

        <!-- Tabs (dynamic) -->
        <div class="tabs" id="tabsContainer">
        </div>

        <!-- Ranking Table -->
        <div class="ranking-table" id="rankingTable">
            <div class="empty-state">Cargando ranking...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCzN4xNEE_hKshXbsVqLhWSnzet1pHwRh8",
            authDomain: "profe-blog.firebaseapp.com",
            databaseURL: "https://profe-blog-default-rtdb.firebaseio.com",
            projectId: "profe-blog",
            storageBucket: "profe-blog.firebasestorage.app",
            messagingSenderId: "305920739217",
            appId: "1:305920739217:web:2e08c7469d2988d8b3bc30"
        };
        firebase.initializeApp(FIREBASE_CONFIG);
        const auth = firebase.auth();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        const db = firebase.database();
        const BASE = 'plataforma_estudiantes';

        // Course pairs for ranking comparison (each pair gets its own ranking view)
        const CURSO_LABELS = {'1A-HC':'1°A HC','1B-HC':'1°B HC','2A-HC':'2°A HC','2B-HC':'2°B HC','3A-HC':'3°A HC','3B-HC':'3°B HC','4A-HC':'4°A HC','4B-HC':'4°B HC'};
        const CURSO_SHORT = {'1A-HC':'1°A','1B-HC':'1°B','2A-HC':'2°A','2B-HC':'2°B','3A-HC':'3°A','3B-HC':'3°B','4A-HC':'4°A','4B-HC':'4°B'};
        const RANKING_PAIRS = {
            '1A-HC': ['1A-HC','1B-HC'],
            '1B-HC': ['1A-HC','1B-HC'],
            '2A-HC': ['2A-HC','2B-HC'],
            '2B-HC': ['2A-HC','2B-HC'],
            '3A-HC': ['3A-HC','3B-HC'],
            '3B-HC': ['3A-HC','3B-HC'],
            '4A-HC': ['4A-HC','4B-HC'],
            '4B-HC': ['4A-HC','4B-HC']
        };

        let allRanking = {};
        let allSessions = {};
        let currentUid = null;
        let currentTab = '';
        let myPair = [];

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Get student's curso to determine which pair to show
            const snap = await db.ref(BASE + '/estudiantes/' + user.uid + '/curso').once('value');
            const curso = snap.val() || '2A-HC';
            myPair = RANKING_PAIRS[curso] || ['2A-HC','2B-HC'];
            currentTab = myPair[0];

            // Build dynamic UI
            document.getElementById('nameA').textContent = CURSO_LABELS[myPair[0]] || myPair[0];
            document.getElementById('nameB').textContent = CURSO_LABELS[myPair[1]] || myPair[1];

            // Build tabs
            const tabsHtml = `<button class="tab active" data-tab="${myPair[0]}" onclick="switchTab(this)">${CURSO_LABELS[myPair[0]]}</button>` +
                `<button class="tab" data-tab="${myPair[1]}" onclick="switchTab(this)">${CURSO_LABELS[myPair[1]]}</button>` +
                `<button class="tab" data-tab="all" onclick="switchTab(this)">Todos</button>`;
            document.getElementById('tabsContainer').innerHTML = tabsHtml;

            await loadData();
        });

        async function loadData() {
            try {
                const [rankSnap, sesSnap] = await Promise.all([
                    db.ref(BASE + '/ranking').once('value'),
                    db.ref(BASE + '/sesiones').once('value')
                ]);
                allRanking = rankSnap.val() || {};
                allSessions = sesSnap.val() || {};

                // Populate session dropdown
                const select = document.getElementById('sessionSelect');
                Object.entries(allSessions).forEach(([id, ses]) => {
                    if (ses.activa !== false) {
                        const opt = document.createElement('option');
                        opt.value = id;
                        opt.textContent = ses.titulo || id;
                        select.appendChild(opt);
                    }
                });

                loadRanking();
                loadComparison();
            } catch(e) { console.error(e); }
        }

        function loadComparison() {
            const courseA = myPair[0], courseB = myPair[1];
            const courseScores = {};
            courseScores[courseA] = {};
            courseScores[courseB] = {};

            for (const [sesId, cursos] of Object.entries(allRanking)) {
                for (const [curso, students] of Object.entries(cursos || {})) {
                    if (!courseScores[curso]) continue;
                    for (const [uid, data] of Object.entries(students || {})) {
                        if (!courseScores[curso][uid]) courseScores[curso][uid] = { total: 0, count: 0 };
                        courseScores[curso][uid].total += (data.porcentaje || 0);
                        courseScores[curso][uid].count++;
                    }
                }
            }

            function courseAvg(obj) {
                const students = Object.values(obj);
                if (students.length === 0) return 0;
                const avgs = students.map(s => s.count > 0 ? s.total / s.count : 0);
                return Math.round(avgs.reduce((a, b) => a + b, 0) / avgs.length);
            }

            const avgA = courseAvg(courseScores[courseA]);
            const avgB = courseAvg(courseScores[courseB]);

            document.getElementById('globalA').textContent = avgA + '%';
            document.getElementById('globalB').textContent = avgB + '%';

            const labelA = CURSO_LABELS[courseA], labelB = CURSO_LABELS[courseB];
            const banner = document.getElementById('winnerBanner');
            if (avgA > avgB && avgA > 0) {
                banner.innerHTML = '<div class="winner-banner a">🏆 ' + labelA + ' lidera con ' + (avgA - avgB) + ' puntos de ventaja</div>';
            } else if (avgB > avgA && avgB > 0) {
                banner.innerHTML = '<div class="winner-banner b">🏆 ' + labelB + ' lidera con ' + (avgB - avgA) + ' puntos de ventaja</div>';
            } else if (avgA > 0) {
                banner.innerHTML = '<div class="winner-banner tie">🤝 ¡Empate técnico!</div>';
            }
        }

        function loadRanking() {
            const selectedSession = document.getElementById('sessionSelect').value;
            const studentMap = {};

            if (selectedSession === 'all') {
                for (const [sesId, cursos] of Object.entries(allRanking)) {
                    for (const [curso, students] of Object.entries(cursos || {})) {
                        // Only show students from my pair
                        if (!myPair.includes(curso)) continue;
                        for (const [uid, r] of Object.entries(students || {})) {
                            if (!studentMap[uid]) studentMap[uid] = { nombre: r.nombre, curso: curso, totalPuntaje: 0, totalPct: 0, totalTiempo: 0, count: 0 };
                            studentMap[uid].totalPuntaje += r.puntaje || 0;
                            studentMap[uid].totalPct += r.porcentaje || 0;
                            studentMap[uid].totalTiempo += r.tiempo || 0;
                            studentMap[uid].count++;
                        }
                    }
                }
            } else {
                const sesRanking = allRanking[selectedSession] || {};
                for (const [curso, students] of Object.entries(sesRanking)) {
                    if (!myPair.includes(curso)) continue;
                    for (const [uid, r] of Object.entries(students || {})) {
                        studentMap[uid] = { nombre: r.nombre, curso: curso, totalPuntaje: r.puntaje || 0, totalPct: r.porcentaje || 0, totalTiempo: r.tiempo || 0, count: 1 };
                    }
                }
            }

            const scores = Object.entries(studentMap).map(([uid, s]) => ({
                uid: uid,
                nombre: s.nombre,
                curso: s.curso,
                puntaje: s.totalPuntaje,
                promedio: Math.round(s.totalPct / s.count),
                tiempo: s.totalTiempo,
                sesiones: s.count
            }));

            scores.sort((a, b) => {
                if (b.puntaje !== a.puntaje) return b.puntaje - a.puntaje;
                return a.tiempo - b.tiempo;
            });
            renderTable(scores);
        }

        function switchTab(btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            loadRanking();
        }

        function formatTime(seconds) {
            if (!seconds && seconds !== 0) return '-';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m + ':' + String(s).padStart(2, '0');
        }

        function renderTable(scores) {
            const container = document.getElementById('rankingTable');
            let filtered = currentTab === 'all' ? scores : scores.filter(s => s.curso === currentTab);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay resultados disponibles aún.</div>';
                return;
            }

            const top10 = filtered.slice(0, 10);
            const totalStudents = filtered.length;

            let html = '<table><thead><tr><th style="width:50px">#</th><th>Estudiante</th><th>Curso</th><th style="width:160px">Logro</th><th style="width:70px">Buenas</th><th style="width:70px">⏱ Tiempo</th></tr></thead><tbody>';

            top10.forEach((s, i) => {
                const pos = i + 1;
                const posClass = pos <= 3 ? 'pos-' + pos : 'pos-other';
                const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;
                const isMe = s.uid === currentUid;
                const rowClass = isMe ? 'highlight' : '';
                const cursoLabel = CURSO_SHORT[s.curso] || s.curso;

                html += `<tr class="${rowClass}">
                    <td><span class="pos-badge ${posClass}">${medal}</span></td>
                    <td>${s.nombre}${isMe ? ' <span style="font-size:10px;color:#1e40af;">(tú)</span>' : ''}</td>
                    <td>${cursoLabel}</td>
                    <td><div class="pct-bar"><div class="bar"><div class="fill" style="width:${s.promedio}%"></div></div><span class="value">${s.promedio}%</span></div></td>
                    <td style="text-align:center; font-weight:700; color:#0f172a;">${s.puntaje}</td>
                    <td class="time-cell" style="text-align:center;">${formatTime(s.tiempo)}</td>
                </tr>`;
            });

            html += '</tbody></table>';

            const myIdx = filtered.findIndex(s => s.uid === currentUid);
            if (myIdx >= 10) {
                const me = filtered[myIdx];
                html += '<div class="top10-note" style="background:#eff6ff; border-radius:0 0 12px 12px; padding:12px 16px; font-style:normal; color:#1e40af; font-weight:600;">Tu posición: #' + (myIdx + 1) + ' de ' + totalStudents + ' — ' + me.promedio + '% logro · ' + formatTime(me.tiempo) + '</div>';
            } else if (totalStudents > 10) {
                html += '<div class="top10-note">Mostrando Top 10 de ' + totalStudents + ' estudiantes</div>';
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
